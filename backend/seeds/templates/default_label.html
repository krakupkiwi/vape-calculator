<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page {
    size: {{ page_width }}mm {{ page_height }}mm;
    margin: 3mm;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Liberation Sans', 'Arial', sans-serif;
    font-size: 8pt;
    width: {{ page_width - 6 }}mm;
    height: {{ page_height - 6 }}mm;
    overflow: hidden;
  }
  .header {
    font-size: 12pt;
    font-weight: bold;
    text-align: center;
    margin-bottom: 1mm;
  }
  .subheader {
    text-align: center;
    font-size: 8pt;
    color: #555;
    margin-bottom: 2mm;
  }
  .specs {
    display: flex;
    justify-content: space-around;
    margin: 2mm 0;
  }
  .spec-box {
    text-align: center;
    border: 1px solid #999;
    padding: 1mm 3mm;
    border-radius: 2mm;
    font-size: 8pt;
    line-height: 1.3;
  }
  .spec-box strong { font-size: 10pt; }
  .flavors {
    font-size: 7pt;
    margin-top: 2mm;
    line-height: 1.4;
  }
  .footer {
    font-size: 6pt;
    color: #777;
    text-align: right;
    margin-top: 2mm;
  }
</style>
</head>
<body>
  <div class="header">{{ recipe_name }}</div>
  <div class="subheader">{{ author }}</div>

  <div class="specs">
    <div class="spec-box">
      <strong>{{ nic_strength }}mg</strong><br>Nicotine
    </div>
    <div class="spec-box">
      <strong>{{ pg_ratio }}/{{ vg_ratio }}</strong><br>PG/VG
    </div>
    <div class="spec-box">
      <strong>{{ batch_size }}ml</strong><br>Volume
    </div>
  </div>

  <div class="flavors">
    <strong>Flavors:</strong>
    {% for flavor in flavors %}{{ flavor.name }} ({{ flavor.percentage }}%){% if not loop.last %}, {% endif %}{% endfor %}
  </div>

  <div class="footer">Mixed: {{ date }} &nbsp;|&nbsp; {{ recipe_name }}</div>
</body>
</html>
